{% extends "app.html" %}

{% block body_class %}{{ block.super }} page-pod-create{% endblock %}

{% block content %}
<form method="post" id="createPodForm" data-pod-hash="{{ hash }}">
    {% csrf_token %}
    <input type="hidden" name="hash" value="{{ hash }}">

    {{ form.as_p }}

    <p class="form-actions">
        <button type="submit">Create Pod</button>
    </p>
</form>
{% endblock %}
