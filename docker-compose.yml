services:
  privipod:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      - privipod_data:/data
    environment:
      - PRIVIPOD_STORE=/data/privipod.db
      - PRIVIPOD_USER=admin
      # Set an initial password for the admin user - change after first login
      - PRIVIPOD_PASS=
      # Generate with: uv run --with django python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
      - PRIVIPOD_SECRET_KEY=
      # Your domain name, eg privipod.example.com - enables deployed mode
      - PRIVIPOD_HOSTNAME=
    expose:
      - "8000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  privipod_data:
  caddy_data:
  caddy_config:

networks:
  web:
